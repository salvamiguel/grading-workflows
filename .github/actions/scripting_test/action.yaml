name: Scripting Test
description: Validate student Bash scripts using BATS (Bash Automated Testing System)

inputs:
  script_name:
    description: >
      Filename of the student's script (e.g. "saludo.sh").
      The script is expected at scripts/<script_name>.
      The BATS test is derived by convention: saludo.sh -> tests/test_saludo.bats
    required: true
  allow_failure:
    description: >
      If "true", the action will report test results but will not fail the workflow.
      Useful for optional challenges (retos) where failure should not block the pipeline.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install BATS
      shell: bash
      run: |
        if ! command -v bats &> /dev/null; then
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats
        fi

    - name: Validate script exists
      shell: bash
      run: |
        SCRIPT_PATH="scripts/${{ inputs.script_name }}"

        if [[ ! -f "$SCRIPT_PATH" ]]; then
          echo "::error::Script not found: $SCRIPT_PATH"
          echo "Make sure your script is located at $SCRIPT_PATH in your repository."
          exit 1
        fi

        if [[ ! -x "$SCRIPT_PATH" ]]; then
          echo "::warning::Script $SCRIPT_PATH is not executable. Adding execute permission."
          chmod +x "$SCRIPT_PATH"
        fi

    - name: Derive and validate test file
      id: derive_test
      shell: bash
      run: |
        SCRIPT_NAME="${{ inputs.script_name }}"

        # Strip extension and derive test filename
        # saludo.sh -> test_saludo.bats
        # tf-wrapper.bats -> test_tf-wrapper_bats.bats (validates student BATS tests)
        if [[ "$SCRIPT_NAME" == *.bats ]]; then
          BASENAME="${SCRIPT_NAME%.bats}"
          TEST_FILE="test_${BASENAME}_bats.bats"
        else
          BASENAME="${SCRIPT_NAME%.sh}"
          TEST_FILE="test_${BASENAME}.bats"
        fi

        TEST_PATH="${{ github.action_path }}/tests/${TEST_FILE}"

        if [[ ! -f "$TEST_PATH" ]]; then
          echo "::error::No test suite found for '$SCRIPT_NAME'. Expected: $TEST_FILE"
          exit 1
        fi

        echo "test_path=$TEST_PATH" >> "$GITHUB_OUTPUT"
        echo "test_file=$TEST_FILE" >> "$GITHUB_OUTPUT"

    - name: Run BATS tests
      id: bats
      shell: bash
      run: |
        export SCRIPT_UNDER_TEST="scripts/${{ inputs.script_name }}"

        echo "::group::Running ${{ steps.derive_test.outputs.test_file }}"

        if bats --tap "${{ steps.derive_test.outputs.test_path }}" 2>&1 | tee /tmp/bats_output.txt; then
          echo "::endgroup::"
          echo "status=success" >> "$GITHUB_OUTPUT"
        else
          echo "::endgroup::"
          echo "status=failure" >> "$GITHUB_OUTPUT"
        fi

        echo "result<<EOF" >> "$GITHUB_OUTPUT"
        cat /tmp/bats_output.txt >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Print Result
      shell: bash
      run: |
        if [[ "${{ steps.bats.outputs.status }}" != "success" ]]; then
          if [[ "${{ inputs.allow_failure }}" == "true" ]]; then
            echo "::warning::BATS tests failed for ${{ inputs.script_name }} (allow_failure=true, not blocking):"
            echo "${{ steps.bats.outputs.result }}"
          else
            echo "::error::BATS tests failed for ${{ inputs.script_name }}:"
            echo "${{ steps.bats.outputs.result }}"
            exit 1
          fi
        else
          echo "::notice::All tests passed for ${{ inputs.script_name }}"
        fi
